name: Balance Checker
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  balances:
    name: Balance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run the balance checker. Crashes on failure
        run: npx tsx scripts/balance-checker.ts
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  extensions:
    name: Token Extensions Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check token extensions
        run: npx tsx scripts/check-extensions.ts
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
